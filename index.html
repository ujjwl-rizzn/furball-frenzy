<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furball Frenzy</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>Coins: <span id="coins">0</span></div>
  <button onclick="restartGame()">Restart</button>
  <button onclick="toggleShop()">Shop</button>
</div>

<div id="shop" class="hidden">
  <h2>Shop</h2>
  <button onclick="buySkin('lime', 0)">Default (Free)</button>
  <button onclick="buySkin('cyan', 5)">Cyan (5 coins)</button>
  <button onclick="buySkin('yellow', 10)">Yellow (10 coins)</button>
  <button onclick="buySkin('red', 20)">Red (20 coins)</button>
  <button onclick="toggleShop()">Close</button>
</div>

<canvas id="game"></canvas>

<script src="game.js"></script>
</body>
</html>
